<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>10X CRM - Sign Up</title>

    <link rel="stylesheet" href="./css/styles.css">

</head>

<body>

    <div class="auth-container">

        <h1>Create your account</h1>

        <form id="signupForm">

            <div class="form-group">

                <label>Full Name</label>

                <input type="text" id="fullName">

                <small class="error" id="nameError"></small>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input type="email" id="signupEmail">

                <small class="error" id="signupEmailError"></small>

            </div>

            <div class="form-group">

                <label>Company</label>

                <input type="text" id="company" placeholder="Company (optional)">

            </div>

            <div class="form-group">

                <label>Password</label>

                <input type="password" id="signupPassword">

                <small class="error" id="signupPasswordError"></small>

            </div>

            <div class="form-group">

                <label>Confirm Password</label>

                <input type="password" id="confirmPassword">

                <small class="error" id="confirmPasswordError"></small>

            </div>

            <button type="submit">
                Create Account
            </button>

        </form>

        <p>

            Already have an account?

            <a href="index.html">
                Log in
            </a>

        </p>

    </div>

    <div id="toast"></div>

    <script src="./js/starage.js"></script>
    <script src="js/guard.js"></script>
    <script src="./js/auth.js"></script>

</body>

</html>
